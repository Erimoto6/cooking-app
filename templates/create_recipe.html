{% extends "base.html" %}

{% block title %}Create Recipe{% endblock %}

{% block content %}
<div class="create-screen">
    <h1>Create New Recipe</h1>
    
    <form method="POST" id="createRecipeForm">
        <div class="form-group">
            <label>Recipe Title *</label>
            <input type="text" name="title" required>
        </div>
        
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3" placeholder="Brief description of your recipe..."></textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Cuisine</label>
                <select name="cuisine">
                    <option value="African">African</option>
                    <option value="Asian">Asian</option>
                    <option value="European">European</option>
                    <option value="North American">North American</option>
                    <option value="South American">South American</option>
                    <option value="Oceanian">Oceanian</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Region</label>
                <input type="text" name="region" placeholder="e.g., Philippines, Italy, Japan">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Prep Time (min)</label>
                <input type="number" name="prep_time" value="15">
            </div>
            
            <div class="form-group">
                <label>Cook Time (min)</label>
                <input type="number" name="cook_time" value="30">
            </div>
            
            <div class="form-group">
                <label>Difficulty</label>
                <select name="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Ingredients</label>
            <div id="ingredientsList">
                <div class="ingredient-row">
                    <input type="text" name="ingredient_name[]" placeholder="Ingredient name">
                    <input type="text" name="ingredient_quantity[]" placeholder="Quantity">
                    <button type="button" onclick="removeIngredient(this)" class="remove-btn">✖️</button>
                </div>
            </div>
            <button type="button" onclick="addIngredient()" class="add-item-btn">+ Add Ingredient</button>
        </div>
        
        <div class="form-group">
            <label>Steps</label>
            <div id="stepsList">
                <div class="step-row">
                    <textarea name="step[]" rows="2" placeholder="Step 1..."></textarea>
                    <button type="button" onclick="removeStep(this)" class="remove-btn">✖️</button>
                </div>
            </div>
            <button type="button" onclick="addStep()" class="add-item-btn">+ Add Step</button>
        </div>
        
        <button type="submit" class="submit-btn">✨ Create Recipe</button>
    </form>
</div>

<script>
let ingredientCount = 1;
let stepCount = 1;

function addIngredient() {
    const div = document.createElement('div');
    div.className = 'ingredient-row';
    div.innerHTML = `
        <input type="text" name="ingredient_name[]" placeholder="Ingredient name">
        <input type="text" name="ingredient_quantity[]" placeholder="Quantity">
        <button type="button" onclick="removeIngredient(this)" class="remove-btn">✖️</button>
    `;
    document.getElementById('ingredientsList').appendChild(div);
}

function removeIngredient(btn) {
    btn.parentElement.remove();
}

function addStep() {
    stepCount++;
    const div = document.createElement('div');
    div.className = 'step-row';
    div.innerHTML = `
        <textarea name="step[]" rows="2" placeholder="Step ${stepCount}..."></textarea>
        <button type="button" onclick="removeStep(this)" class="remove-btn">✖️</button>
    `;
    document.getElementById('stepsList').appendChild(div);
}

function removeStep(btn) {
    btn.parentElement.remove();
}
</script>
{% endblock %}
