{% extends "base.html" %}
{% block title %}Login - Dishly{% endblock %}

{% block styles %}
<style>
  @keyframes l-float1 {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.1); }
  }
  @keyframes l-float2 {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-25px,35px) scale(0.95); }
  }
  @keyframes l-float3 {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(15px,20px) scale(1.05); }
  }
  @keyframes l-fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .l-screen {
    min-height: 100vh;
    background: #160800;
    display: flex;
    flex-direction: column;
    padding: 52px 28px 48px;
    position: relative;
    overflow: hidden;
  }

  .l-blob1 {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, #8B2500 0%, transparent 70%);
    top: -90px; left: -70px;
    animation: l-float1 8s ease-in-out infinite;
    opacity: 0.75;
    pointer-events: none;
  }

  .l-blob2 {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, #5C1A00 0%, transparent 70%);
    bottom: 80px; right: -60px;
    animation: l-float2 10s ease-in-out infinite;
    opacity: 0.6;
    pointer-events: none;
  }

  .l-blob3 {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, #C0392B 0%, transparent 70%);
    top: 200px; left: 10px;
    animation: l-float3 7s ease-in-out infinite;
    opacity: 0.3;
    pointer-events: none;
  }

  .l-overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,2,0,0.5);
    pointer-events: none;
  }

  .l-back {
    position: relative;
    z-index: 1;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 32px;
    display: inline-block;
    animation: l-fadeUp 0.6s ease forwards;
  }

  .l-header {
    position: relative;
    z-index: 1;
    margin-bottom: 32px;
    animation: l-fadeUp 0.6s ease 0.1s both;
  }

  .l-eyebrow {
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 6px;
  }

  .l-title {
    color: #ffffff;
    font-size: 30px;
    font-family: 'Georgia', serif;
    font-style: italic;
    font-weight: bold;
    line-height: 1.2;
    margin: 0;
  }

  .l-form {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: l-fadeUp 0.6s ease 0.2s both;
  }

  .l-input {
    padding: 14px 18px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #ffffff;
    font-size: 14px;
    outline: none;
    width: 100%;
    font-family: inherit;
  }

  .l-input::placeholder {
    color: rgba(255,255,255,0.4);
  }

  .l-input:focus {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.12);
  }

  .l-forgot {
    text-align: right;
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    text-decoration: none;
    display: block;
  }

  .l-submit {
    margin-top: 4px;
    padding: 14px;
    border-radius: 30px;
    background: #C0392B;
    border: none;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    cursor: pointer;
    width: 100%;
  }

  .l-submit:hover {
    background: #a93226;
  }

.l-input:-webkit-autofill,
.l-input:-webkit-autofill:hover,
.l-input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0px 1000px rgba(40, 10, 3, 0.9) inset;
    -webkit-text-fill-color: #ffffff;
    border: 1px solid rgba(255,255,255,0.15);
    transition: background-color 5000s ease-in-out 0s;
}
</style>
{% endblock %}

{% block content %}
<div class="l-screen">
  <div class="l-blob1"></div>
  <div class="l-blob2"></div>
  <div class="l-blob3"></div>
  <div class="l-overlay"></div>

  <a href="{{ url_for('welcome') }}" class="l-back">← Back</a>

  <div class="l-header">
    <p class="l-eyebrow">Welcome back</p>
    <h1 class="l-title">Are you ready<br>to Cook?</h1>
  </div>

  <form method="POST" class="l-form">
    <input type="tel" name="phone_number" placeholder="Phone Number" class="l-input" required>
    <input type="password" name="password" placeholder="Password" class="l-input" required>
    <a href="#" class="l-forgot" onclick="alert('Reset password - Coming Soon!')">Forgot password?</a>
    <button type="submit" class="l-submit">Log In</button>
  </form>
</div>
{% endblock %}
