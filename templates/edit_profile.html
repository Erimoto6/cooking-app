{% extends "base.html" %}
{% block title %}Edit Profile - Dishly{% endblock %}

{% block styles %}
<style>
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ep-screen {
    min-height: 100vh;
    background: #0f0500;
    padding: 52px 20px 100px;
    position: relative;
    overflow: hidden;
  }

  .ep-blob1 {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, #6B1A00 0%, transparent 70%);
    top: -80px; right: -60px;
    animation: float1 9s ease-in-out infinite;
    opacity: 0.5;
    pointer-events: none;
  }

  @keyframes float1 {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(20px,-30px) scale(1.08); }
  }

  .ep-overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,1,0,0.55);
    pointer-events: none;
  }

  .ep-header {
    position: relative;
    z-index: 1;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease forwards;
  }

  .ep-back {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-size: 14px;
    display: inline-block;
    margin-bottom: 20px;
  }

  .ep-title {
    color: #ffffff;
    font-size: 30px;
    font-family: 'Georgia', serif;
    font-style: italic;
    font-weight: bold;
    margin: 0;
  }

  .ep-form {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    transition: all 0.2s;
  }

  .form-group input:focus {
    outline: none;
    border-color: #C0392B;
    background: rgba(255,255,255,0.1);
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #C0392B;
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .submit-btn:active {
    background: #a93226;
  }
</style>
{% endblock %}

{% block content %}
<div class="ep-screen">
  <div class="ep-blob1"></div>
  <div class="ep-overlay"></div>

  <div class="ep-header">
    <a href="{{ url_for('profile') }}" class="ep-back">← Back to Profile</a>
    <h1 class="ep-title">Edit Profile</h1>
  </div>

  <div class="ep-form">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ user.username }}" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone_number" value="{{ user.phone_number }}" required>
      </div>
      <button type="submit" class="submit-btn">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
