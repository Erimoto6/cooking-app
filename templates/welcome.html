{% extends "base.html" %}

{% block title %}Welcome{% endblock %}

{% block content %}
<div class="welcome-screen">
    <div class="welcome-logo">
        <div class="logo-icon">🍳</div>
        <h1>Welcome to</h1>
        <h1 class="brand-name">What's Cookin'!</h1>
    </div>
    
    <div class="welcome-buttons">
        <button class="google-btn" onclick="alert('Google Sign In - Coming Soon!')">
            <span>📧</span> Continue with Google
        </button>
        
        <a href="{{ url_for('signup') }}" class="get-started-btn">Get Started</a>
        
        <a href="{{ url_for('login') }}" class="login-link">I Already Have an Account</a>
    </div>
</div>
{% endblock %}
